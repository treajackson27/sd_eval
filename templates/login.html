<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>신도고 인문사회 발표마당</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f4; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h2 class="mb-4 fw-bold text-primary">신도고 인문·사회<br>주제 탐구 발표 마당</h2>
        <form action="/login" method="POST">
            <input type="text" name="code" class="form-control form-control-lg mb-3 text-center" placeholder="접속 코드" required autofocus>
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">로그인</button>
        </form>
    </div>
</body>
</html>
